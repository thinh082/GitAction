name: Jules AI Auto File Generator
on:
  push:
    branches: [main, master]

jobs:
  jules-agent-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Jules to Create Random File
        run: |
          echo "Jules is starting a new session to generate a random file..."
          # Chúng ta thay đổi câu lệnh prompt gửi cho Jules
          # Lưu ý: Lệnh này yêu cầu bạn đã setup JULES_TOKEN hoặc GitHub App cho repo
          jules remote new --session "Create a new random .md file in the root directory with some creative content, then submit a Pull Request."
